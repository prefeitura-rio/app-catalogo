---
# API — Argo Rollout com BlueGreen (prod)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: catalogo
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: catalogo
  strategy:
    blueGreen:
      activeService: catalogo
      previewService: catalogo-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      previewReplicaCount: 1
  template:
    metadata:
      labels:
        app: catalogo
      annotations:
        sidecar.istio.io/proxyCPU: "100m"
        sidecar.istio.io/proxyCPULimit: "1000m"
        sidecar.istio.io/proxyMemory: "512Mi"
        sidecar.istio.io/proxyMemoryLimit: "1Gi"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: catalogo
          image: ghcr.io/prefeitura-rio/app-catalogo:stable
          command: ["./api"]
          ports:
            - containerPort: 8080
          env:
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_ENDPOINT
              value: "signoz-otel-collector.signoz.svc.cluster.local:4317"
            - name: TRACING_SERVICE_NAME
              value: "app-catalogo"
            - name: TRACING_SERVICE_VERSION
              value: "v1.0.0"
            - name: RUN_MIGRATIONS
              value: "true"
          envFrom:
            - secretRef:
                name: catalogo-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always

---
# Worker (sync de fontes de dados) — Deployment (prod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo-worker
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogo-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: catalogo-worker
      annotations:
        sidecar.istio.io/proxyCPU: "50m"
        sidecar.istio.io/proxyCPULimit: "500m"
        sidecar.istio.io/proxyMemory: "256Mi"
        sidecar.istio.io/proxyMemoryLimit: "512Mi"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: catalogo-worker
          image: ghcr.io/prefeitura-rio/app-catalogo:stable
          command: ["./worker"]
          envFrom:
            - secretRef:
                name: catalogo-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      restartPolicy: Always

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogo-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalogo

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogo-worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalogo-worker

---
# KEDA aponta para o Rollout (não para Deployment)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: catalogo-scaled-object
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: catalogo
  minReplicaCount: 2
  maxReplicaCount: 30
  cooldownPeriod: 30
  pollingInterval: 10
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 2
              periodSeconds: 15
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 10
              periodSeconds: 60
            - type: Pods
              value: 1
              periodSeconds: 60
          selectPolicy: Max
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.istio-system.svc.cluster.local:9090
        metricName: http_requests_total
        threshold: "200"
        query: sum(rate(istio_requests_total{destination_workload="catalogo"}[30s]))
        activationThreshold: "150"

---
# Service ativo (recebe tráfego real)
apiVersion: v1
kind: Service
metadata:
  name: catalogo
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
# Service de preview (nova versão antes da promoção)
apiVersion: v1
kind: Service
metadata:
  name: catalogo-preview
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
