---
# AnalysisTemplate — verifica taxa de sucesso e latência durante o canary
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: catalogo-success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 30s
      failureLimit: 2
      successCondition: result[0] >= 0.98   # >= 98% de respostas 2xx/3xx
      provider:
        prometheus:
          address: http://prometheus.istio-system.svc.cluster.local:9090
          query: |
            sum(rate(istio_requests_total{
              destination_workload="{{args.service-name}}",
              response_code!~"5.*"
            }[1m])) /
            sum(rate(istio_requests_total{
              destination_workload="{{args.service-name}}"
            }[1m]))

    - name: p99-latency
      interval: 30s
      failureLimit: 2
      successCondition: result[0] <= 0.5    # p99 <= 500ms
      provider:
        prometheus:
          address: http://prometheus.istio-system.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99, sum(rate(
              istio_request_duration_milliseconds_bucket{
                destination_workload="{{args.service-name}}"
              }[1m]
            )) by (le)) / 1000

---
# API — Argo Rollout com Canary + Istio traffic shifting (prod)
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: catalogo
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: catalogo
  strategy:
    canary:
      canaryService: catalogo-canary
      stableService: catalogo-stable
      trafficRouting:
        istio:
          virtualService:
            name: catalogo-vs
          destinationRule:
            name: catalogo-dr
            canarySubsetName: canary
            stableSubsetName: stable
      analysis:
        templates:
          - templateName: catalogo-success-rate
        args:
          - name: service-name
            value: catalogo
      steps:
        - setWeight: 10
        - pause: {duration: 2m}
        - setWeight: 25
        - pause: {duration: 5m}
        - setWeight: 50
        - pause: {duration: 5m}
        - setWeight: 75
        - pause: {duration: 5m}
        - setWeight: 100
  template:
    metadata:
      labels:
        app: catalogo
      annotations:
        sidecar.istio.io/proxyCPU: "100m"
        sidecar.istio.io/proxyCPULimit: "1000m"
        sidecar.istio.io/proxyMemory: "512Mi"
        sidecar.istio.io/proxyMemoryLimit: "1Gi"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: catalogo
          image: ghcr.io/prefeitura-rio/app-catalogo:stable
          command: ["/docker-entrypoint.sh", "./api"]
          ports:
            - containerPort: 8080
          env:
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_ENDPOINT
              value: "signoz-otel-collector.signoz.svc.cluster.local:4317"
            - name: TRACING_SERVICE_NAME
              value: "app-catalogo"
            - name: TRACING_SERVICE_VERSION
              value: "v1.0.0"
            - name: RUN_MIGRATIONS
              value: "true"
          envFrom:
            - secretRef:
                name: catalogo-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      restartPolicy: Always

---
# Worker — Deployment simples (não precisa de canary)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo-worker
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogo-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: catalogo-worker
      annotations:
        sidecar.istio.io/proxyCPU: "50m"
        sidecar.istio.io/proxyCPULimit: "500m"
        sidecar.istio.io/proxyMemory: "256Mi"
        sidecar.istio.io/proxyMemoryLimit: "512Mi"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: catalogo-worker
          image: ghcr.io/prefeitura-rio/app-catalogo:stable
          command: ["./worker"]
          envFrom:
            - secretRef:
                name: catalogo-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      restartPolicy: Always

---
# Istio VirtualService — controla o split de tráfego stable/canary
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: catalogo-vs
spec:
  hosts:
    - catalogo
  http:
    - route:
        - destination:
            host: catalogo
            subset: stable
            port:
              number: 80
          weight: 100
        - destination:
            host: catalogo
            subset: canary
            port:
              number: 80
          weight: 0

---
# Istio DestinationRule — define os subsets stable e canary
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: catalogo-dr
spec:
  host: catalogo
  subsets:
    - name: stable
      labels:
        app: catalogo
    - name: canary
      labels:
        app: catalogo

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogo-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalogo

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogo-worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalogo-worker

---
# KEDA aponta para o Rollout
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: catalogo-scaled-object
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: catalogo
  minReplicaCount: 2
  maxReplicaCount: 30
  cooldownPeriod: 30
  pollingInterval: 10
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 2
              periodSeconds: 15
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 10
              periodSeconds: 60
            - type: Pods
              value: 1
              periodSeconds: 60
          selectPolicy: Max
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.istio-system.svc.cluster.local:9090
        metricName: http_requests_total
        threshold: "200"
        query: sum(rate(istio_requests_total{destination_workload="catalogo"}[30s]))
        activationThreshold: "150"

---
# Service stable (recebe tráfego principal)
apiVersion: v1
kind: Service
metadata:
  name: catalogo-stable
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
# Service canary (recebe fatia do tráfego durante o rollout)
apiVersion: v1
kind: Service
metadata:
  name: catalogo-canary
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
# Service principal (entrada — aponta para o VirtualService)
apiVersion: v1
kind: Service
metadata:
  name: catalogo
spec:
  selector:
    app: catalogo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
