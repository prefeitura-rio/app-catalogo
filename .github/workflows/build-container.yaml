name: Build Container

on:
  push:
    branches:
      - staging

jobs:
  build:
    name: Build & Push :latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if k8s-only changes
        id: check-k8s-only
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          NON_K8S_FILES=$(echo "$CHANGED_FILES" | grep -v "^k8s/" || true)

          if [ -z "$NON_K8S_FILES" ] && [ -n "$CHANGED_FILES" ]; then
            echo "k8s_only=true" >> $GITHUB_OUTPUT
            echo "Only k8s/ files changed, skipping build"
          else
            echo "k8s_only=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/app-catalogo" >> $GITHUB_ENV
          echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_ENV
          echo "SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.COMMIT_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
