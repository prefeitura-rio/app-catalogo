name: Release

on:
  release:
    types: [published]

jobs:
  build-and-deploy:
    name: Build & Push :stable
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract release metadata
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NO_V=${VERSION#v}
          COMMIT_HASH=$(git rev-parse HEAD)
          SHORT_HASH=$(git rev-parse --short HEAD)
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/app-catalogo"

          echo "VERSION=$VERSION"           >> $GITHUB_ENV
          echo "VERSION_NO_V=$VERSION_NO_V" >> $GITHUB_ENV
          echo "COMMIT_HASH=$COMMIT_HASH"   >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH"     >> $GITHUB_ENV
          echo "IMAGE_NAME=$IMAGE_NAME"     >> $GITHUB_ENV
          echo "RELEASE_URL=https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.VERSION_NO_V }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 Release — app-catalogo" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`$SHORT_HASH\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**: \`:stable\`, \`:$VERSION\`, \`:$VERSION_NO_V\`" >> $GITHUB_STEP_SUMMARY

      - name: Send Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook não configurado, pulando"
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Succeeded"
            COLOR="3066993"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
            COLOR="15158332"
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_HASH"

          DISCORD_PAYLOAD=$(cat <<EOF
          {
            "content": "<@&903644455582695494>",
            "embeds": [{
              "title": "${STATUS_EMOJI} Production Release ${STATUS_TEXT} — app-catalogo",
              "description": "Imagem :stable publicada no GHCR.",
              "color": ${COLOR},
              "fields": [
                {"name":"🏷️ Version","value":"[$VERSION]($RELEASE_URL)","inline":true},
                {"name":"📝 Commit","value":"[${COMMIT_MSG:0:60}]($COMMIT_URL)","inline":false},
                {"name":"👤 Author","value":"${COMMIT_AUTHOR}","inline":true},
                {"name":"🔖 Hash","value":"\`${SHORT_HASH}\`","inline":true}
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {"text": "GitHub Actions · app-catalogo"}
            }]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" -d "$DISCORD_PAYLOAD" "${DISCORD_WEBHOOK}?thread_id=1465648387566338140"
