name: CD

on:
  push:
    branches: [main]    # → :latest  (staging consome)
    tags: ["v*"]        # → :stable + :<version>  (prod consome)
  workflow_dispatch:

# Cancela builds anteriores do mesmo branch (não cancela tags nem workflow_dispatch)
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
    inputs:
      version:
        description: "Tag/versão a buildar (ex: v0.1.0). Deixe vazio para usar o commit atual como :latest"
        required: false
        default: ""

jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/app-catalogo"
          SHORT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }})
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' ${{ github.sha }})
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          echo "IMAGE_NAME=$IMAGE_NAME"         >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH"         >> $GITHUB_ENV
          echo "COMMIT_MSG=$COMMIT_MSG"         >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$COMMIT_AUTHOR"   >> $GITHUB_ENV
          echo "COMMIT_URL=$COMMIT_URL"         >> $GITHUB_ENV

          # Tags da imagem
          # workflow_dispatch com version preenchido → trata como release
          MANUAL_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "$MANUAL_VERSION" ]]; then
            VERSION="$MANUAL_VERSION"
            VERSION_NO_V="${VERSION#v}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
            echo "IS_RELEASE=true"              >> $GITHUB_ENV
            echo "VERSION=$VERSION"             >> $GITHUB_ENV
            echo "VERSION_NO_V=$VERSION_NO_V"   >> $GITHUB_ENV
            echo "RELEASE_URL=$RELEASE_URL"     >> $GITHUB_ENV
            echo "TAGS=$IMAGE_NAME:stable,$IMAGE_NAME:$VERSION,$IMAGE_NAME:$VERSION_NO_V" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "IS_RELEASE=false"             >> $GITHUB_ENV
            echo "TAGS=$IMAGE_NAME:latest"      >> $GITHUB_ENV
          else
            VERSION="${{ github.ref_name }}"
            VERSION_NO_V="${VERSION#v}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"
            echo "IS_RELEASE=true"              >> $GITHUB_ENV
            echo "VERSION=$VERSION"             >> $GITHUB_ENV
            echo "VERSION_NO_V=$VERSION_NO_V"   >> $GITHUB_ENV
            echo "RELEASE_URL=$RELEASE_URL"     >> $GITHUB_ENV
            echo "TAGS=$IMAGE_NAME:stable,$IMAGE_NAME:$VERSION,$IMAGE_NAME:$VERSION_NO_V" >> $GITHUB_ENV
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 CD — app-catalogo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_RELEASE" = "true" ]; then
            echo "**Release**: $VERSION" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Branch**: main → :latest (staging)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Commit**: \`$SHORT_HASH\` — $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          echo "**Author**: $COMMIT_AUTHOR" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**: \`$TAGS\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Imagem publicada no GHCR" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Falha no build/push" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook não configurado, pulando notificação"
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Succeeded"
            COLOR="3066993"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
            COLOR="15158332"
          fi

          if [ "$IS_RELEASE" = "true" ]; then
            TITLE="${STATUS_EMOJI} Production Release ${STATUS_TEXT} — app-catalogo"
            DESCRIPTION="Imagem :stable publicada no GHCR. Argo Rollout aguarda promoção manual."
            VERSION_FIELD="{\"name\":\"🏷️ Version\",\"value\":\"[${VERSION}](${RELEASE_URL})\",\"inline\":true},"
            # Mencionar role para release de prod
            CONTENT="\"content\": \"<@&903644455582695494>\","
          else
            TITLE="${STATUS_EMOJI} Staging Build ${STATUS_TEXT} — app-catalogo"
            DESCRIPTION="Imagem :latest publicada. K8s atualizará automaticamente via Infisical auto-reload."
            VERSION_FIELD=""
            CONTENT=""
          fi

          DISCORD_PAYLOAD=$(cat <<EOF
          {
            ${CONTENT}
            "embeds": [{
              "title": "${TITLE}",
              "description": "${DESCRIPTION}",
              "color": ${COLOR},
              "fields": [
                ${VERSION_FIELD}
                {
                  "name": "📝 Commit",
                  "value": "[${COMMIT_MSG:0:60}](${COMMIT_URL})",
                  "inline": false
                },
                {
                  "name": "👤 Author",
                  "value": "${COMMIT_AUTHOR}",
                  "inline": true
                },
                {
                  "name": "🔖 Hash",
                  "value": "\`${SHORT_HASH}\`",
                  "inline": true
                },
                {
                  "name": "🐳 Tags",
                  "value": "\`${TAGS}\`",
                  "inline": false
                }
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {
                "text": "GitHub Actions · app-catalogo"
              }
            }]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" \
               -d "$DISCORD_PAYLOAD" \
               "$DISCORD_WEBHOOK?thread_id=1465648387566338140"
