name: Deploy to Staging with Blue-Green

on:
  push:
    branches:
      - main

jobs:
  deploy-and-test:
    name: Build, Deploy & Promote
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if k8s-only changes
        id: check-k8s-only
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          NON_K8S_FILES=$(echo "$CHANGED_FILES" | grep -v "^k8s/" || true)

          if [ -z "$NON_K8S_FILES" ] && [ -n "$CHANGED_FILES" ]; then
            echo "k8s_only=true" >> $GITHUB_OUTPUT
            echo "Only k8s/ files changed, skipping build"
          else
            echo "k8s_only=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/app-catalogo" >> $GITHUB_ENV
          echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_ENV
          echo "SHORT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=format:'%s')" >> $GITHUB_ENV
          echo "COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')" >> $GITHUB_ENV
          echo "COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_ENV

      - name: Set up Go
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Install swag
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          mkdir -p bin
          GOBIN="$PWD/bin" go install github.com/swaggo/swag/cmd/swag@latest
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Generate Swagger docs
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: swag init -g cmd/api/main.go --output docs

      - name: Install swagger2openapi
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: npm install -g swagger2openapi

      - name: Convert to OpenAPI v3
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: swagger2openapi docs/swagger.json -o docs/openapi-v3.json

      - name: Post-process OpenAPI v3
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          jq '.servers = [
              {"url": "https://services.staging.app.dados.rio/catalogo", "description": "Staging"},
              {"url": "https://services.pref.rio/catalogo", "description": "Produção"}
            ]' docs/openapi-v3.json > docs/openapi-v3.json.tmp && \
          mv docs/openapi-v3.json.tmp docs/openapi-v3.json

      - name: Configure Git
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'

      - name: Commit and push OpenAPI v3
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          git add docs/openapi-v3.json
          git commit -m "chore: atualiza documentação OpenAPI v3" || echo "Sem alterações"
          git push

      - name: Login to GHCR
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.COMMIT_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image digest
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          DIGEST=$(docker buildx imagetools inspect $IMAGE_NAME:latest \
            --format '{{.Manifest.Digest}}' | grep -oE 'sha256:[a-f0-9]+' | head -n1)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "Image digest: $DIGEST"

      - name: Authenticate to Google Cloud
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Install kubectl
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Install Argo Rollouts kubectl plugin
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          curl -fLO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Configure kubectl for GKE
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: gcloud container clusters get-credentials application --zone=us-central1 --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Update ArgoCD Application image override
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "Updating ArgoCD Application image override..."
          echo "Image: $IMAGE_NAME:$COMMIT_HASH@$DIGEST"

          kubectl patch application catalogo -n argocd --type=merge \
            -p="{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"$IMAGE_NAME:$COMMIT_HASH@$DIGEST\"]}}}}"

          # Força sync imediato (sem isso, ArgoCD pode ficar em Synced sem re-aplicar)
          kubectl annotate application catalogo -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite

          echo "✅ ArgoCD Application updated and refresh triggered"

      - name: Wait for ArgoCD sync and blue-green preview
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        timeout-minutes: 10
        run: |
          echo "Waiting for ArgoCD to sync and create blue-green preview..."
          echo "Expected image: $IMAGE_NAME:$COMMIT_HASH@$DIGEST"

          for i in {1..60}; do
            CURRENT_IMAGE=$(kubectl get rollout catalogo -n catalogo \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
            SYNC_STATUS=$(kubectl get application catalogo -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")

            echo "Attempt $i/60: Image=$CURRENT_IMAGE, ArgoCD Sync=$SYNC_STATUS"

            # Aceita a imagem em dois formatos:
            # 1. IMAGE_NAME:COMMIT_HASH@DIGEST  (patch do CI)
            # 2. IMAGE_NAME:*@DIGEST            (Image Updater com mesmo digest)
            # Quando Docker cache produz o mesmo digest, o Image Updater reverte
            # para :latest@DIGEST antes do CI patch ser aplicado.
            if [[ "$CURRENT_IMAGE" == "$IMAGE_NAME:$COMMIT_HASH@$DIGEST" ]] || \
               [[ "$CURRENT_IMAGE" == *"@$DIGEST" ]]; then
              echo "✅ Rollout spec já está na imagem correta (digest: $DIGEST)"
              break
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Timeout waiting for rollout image update"
              echo "Expected digest: $DIGEST"
              echo "Current image:   $CURRENT_IMAGE"
              exit 1
            fi

            sleep 5
          done

          echo "Waiting for blue-green preview pod to be Running..."
          for i in {1..60}; do
            PREVIEW_POD=$(kubectl get pods -n catalogo -l app=catalogo \
              --field-selector=status.phase=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$PREVIEW_POD" ]; then
              echo "Preview pod $PREVIEW_POD is Running"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for preview pod"
              kubectl get pods -n catalogo -l app=catalogo
              exit 1
            fi
            echo "Attempt $i/60: Waiting for preview pod..."
            sleep 3
          done

          kubectl argo rollouts get rollout catalogo -n catalogo

          # Aguarda o pod de preview ficar Ready (migrations concluídas + API respondendo)
          echo "Waiting for preview pod to be Ready (health probes passing)..."
          kubectl wait pod -n catalogo -l app=catalogo \
            --for=condition=Ready --timeout=300s || true

      - name: Set up port forward to preview service
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          kubectl port-forward -n catalogo service/catalogo-preview 8080:80 &
          PORT_FORWARD_PID=$!
          echo "PORT_FORWARD_PID=$PORT_FORWARD_PID" >> $GITHUB_ENV

          for i in {1..60}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Port-forward is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Port-forward failed to become ready"
              kill $PORT_FORWARD_PID 2>/dev/null || true
              exit 1
            fi
            echo "Attempt $i/60: Waiting for port-forward..."
            sleep 3
          done

      - name: Health check on preview
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "Running health check against preview service..."
          RESPONSE=$(curl -sf http://localhost:8080/health)
          echo "Response: $RESPONSE"

          READY=$(curl -sf http://localhost:8080/ready || echo "fail")
          echo "Ready: $READY"

          if echo "$READY" | grep -q "fail"; then
            echo "❌ Readiness check failed"
            exit 1
          fi

          echo "✅ Health checks passed"

      - name: Clean up port forward
        if: steps.check-k8s-only.outputs.k8s_only != 'true' && always()
        run: kill $PORT_FORWARD_PID 2>/dev/null || true

      - name: Promote to active
        if: steps.check-k8s-only.outputs.k8s_only != 'true' && success()
        run: |
          echo "✅ Health check passed! Promoting to active..."
          kubectl argo rollouts promote catalogo -n catalogo
          kubectl argo rollouts status catalogo -n catalogo --timeout=5m

      - name: Rollback on failure
        if: steps.check-k8s-only.outputs.k8s_only != 'true' && failure()
        run: |
          echo "❌ Health check failed! Aborting rollout..."
          kubectl argo rollouts abort catalogo -n catalogo || true
          echo "Rollout aborted. Active service unchanged."

      - name: Create deployment summary
        if: always() && steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "## 🚀 Staging Deployment — app-catalogo" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`$SHORT_HASH\` — $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`$IMAGE_NAME:$COMMIT_HASH@${DIGEST:0:19}...\`" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Deploy bem-sucedido" >> $GITHUB_STEP_SUMMARY
            echo "- Health check passou" >> $GITHUB_STEP_SUMMARY
            echo "- Blue-green promovido para ativo" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deploy falhou" >> $GITHUB_STEP_SUMMARY
            echo "- Health check falhou" >> $GITHUB_STEP_SUMMARY
            echo "- Rollout abortado — serviço ativo inalterado" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Discord notification
        if: always() && steps.check-k8s-only.outputs.k8s_only != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook não configurado, pulando"
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Succeeded"
            COLOR="3066993"
            DESCRIPTION="Health check passou. Blue-green promovido para ativo."
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
            COLOR="15158332"
            DESCRIPTION="Health check falhou. Rollout abortado. Serviço ativo inalterado."
          fi

          DISCORD_PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${STATUS_EMOJI} Staging Deploy ${STATUS_TEXT} — app-catalogo",
              "description": "${DESCRIPTION}",
              "color": ${COLOR},
              "fields": [
                {"name":"📝 Commit","value":"[${COMMIT_MSG:0:60}]($COMMIT_URL)","inline":false},
                {"name":"👤 Author","value":"${COMMIT_AUTHOR}","inline":true},
                {"name":"🔖 Hash","value":"\`${SHORT_HASH}\`","inline":true},
                {"name":"🐳 Image","value":"\`$IMAGE_NAME:${COMMIT_HASH:0:12}\`","inline":false}
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {"text": "GitHub Actions · app-catalogo"}
            }]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" -d "$DISCORD_PAYLOAD" "${DISCORD_WEBHOOK}?thread_id=1465648387566338140"
